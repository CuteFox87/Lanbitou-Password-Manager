<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white w-80 p-4 font-sans">
  <h1 class="text-xl font-bold mb-4 text-center">Password List</h1>
  <form id="addForm" style="margin-bottom: 1em;">
    <input id="site" type="text" placeholder="Site" required />
    <input id="account" type="text" placeholder="Account" required />
    <input id="password" type="text" placeholder="Password" required />
    <button type="submit">create new</button>
  </form>
  <input id="searchInput" type="text" placeholder="search..." class="mb-2 w-full px-2 py-1 border rounded" />
  <div id="passwordList" class="p-2 overflow-auto max-h-[300px]"></div>
  <script src="passwords.js"></script>
</body>
</html>
