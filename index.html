<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 w-80 p-4 font-sans">

  <h1 class="text-xl font-bold mb-4 text-center">login</h1>

  <div class="flex flex-col gap-3">
    <input id="username" type="text" placeholder="username"
      class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />
    
    <input id="password" type="password" placeholder="password"
      class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" />

    <button id="loginBtn"
      class="bg-blue-600 text-white px-3 py-2 rounded-md hover:bg-blue-700 transition">
      login
    </button>

    <span id="error" class="text-sm text-red-500"></span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
